#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 5
  gaps_out = 10

  border_size = 0

  col.active_border = rgb(e8e8d3)
  col.inactive_border = rgba(00000000)

  resize_on_border = false

  allow_tearing = false

  layout = dwindle
  no_focus_fallback = true
}

decoration {
  rounding = 5
  rounding_power = 2

  active_opacity = 1
  inactive_opacity = 1

  shadow {
    enabled = false
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 10
    passes = 1

    vibrancy = 0.1696
  }
}

